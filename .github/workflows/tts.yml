name: Generate TTS

on:
  push:
    branches: [master, main]
    paths:
      - 'content/episodes/**/*.md'
      - 'scripts/tts.py'
      - 'scripts/episode_lib.py'
      - 'scripts/requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tts
  cancel-in-progress: true

jobs:
  tts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 允许后续 push 触发 Pages deploy
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install edge-tts
        run: pip install -r scripts/requirements.txt

      - name: Generate audio and catalog
        run: python scripts/tts.py

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/audio public/catalog.json
          if git diff --staged --quiet; then
            echo "No audio/catalog changes"
            exit 0
          fi
          git commit -m "chore: regenerate episode audio and catalog"
          git push
