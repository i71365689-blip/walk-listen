name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
    paths-ignore:
      # 讲稿先走 Generate TTS；其成功后再由 workflow_run 部署
      - 'content/episodes/**'
  workflow_run:
    workflows: ['Generate TTS']
    types: [completed]
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run 的 head_sha 是「触发配音的那次提交」，不含后来的音频。
          # 配音完成后应拉默认分支最新代码（含 bot 提交的 mp3/catalog）。
          ref: ${{ github.event_name == 'workflow_run' && github.event.repository.default_branch || github.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_PAGES: '1'
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
